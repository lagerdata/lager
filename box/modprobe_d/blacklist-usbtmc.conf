# Lager 0.20.0+
#
# Blacklist the Linux usbtmc kernel module so it doesn't auto-bind to
# USB-TMC-class instruments (Keithley 2281S, Keysight, Rigol scopes, etc.)
# that lager talks to via pyvisa-py + libusb.
#
# Without this, the kernel claims interface 0 on the device and libusb
# returns [Errno 16] Resource busy on set_configuration(), surfacing as
# "battery net not responding"-class outages. The race re-arms on every
# kernel module reload / box reboot, so it must be blacklisted persistently.
#
# Deployed by cli/deployment/scripts/setup_and_deploy_box.sh and refreshed
# by cli/commands/utility/update.py. Mirrors the box/udev_rules/ pattern.

blacklist usbtmc
