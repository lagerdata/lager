#
# Hardware integration tests for the Lager CLI, run against the shared
# self-hosted "MASTER" bench.
#
# Lock semantics: `lager python` auto-locks the box at the start of each
# invocation and releases it at the end (see
# docs/source/reference/cli/locking.mdx). The steps here run sequentially in a
# single job, so each instrument test acquires and releases the box lock in
# turn; the final "Best-effort lock cleanup" step is defense-in-depth in case a
# step is killed mid-invocation. The `concurrency` group below serializes whole
# workflow runs (and the update-regression workflow) against the one physical
# bench, so runs queue rather than collide.
#
# Security: this repo is PUBLIC and the runner drives real hardware, so this
# workflow deliberately does NOT trigger on `pull_request` — a fork PR must not
# be able to execute code on the bench. It runs on push to `main`, on a nightly
# schedule, and on manual dispatch only.

name: Integration Tests

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 11 * * *"  # ~3 AM PST (GitHub cron is UTC; drifts 1h across DST)
  workflow_dispatch:
    inputs:
      box_name:
        description: "Lager box name (overrides vars.LAGER_BOX)"
        required: false
        type: string

concurrency:
  # One physical bench: serialize whole runs (and update-regression) against it.
  group: hardware-ci-${{ vars.LAGER_BOX || 'MASTER' }}
  cancel-in-progress: false  # never kill a run mid-measurement

jobs:
  hardware-tests:
    name: Run hardware tests on the bench
    runs-on: [self-hosted, lager-bench]
    timeout-minutes: 40

    env:
      LAGER_BOX: ${{ inputs.box_name || vars.LAGER_BOX || 'MASTER' }}
      # Optional lock tuning (defaults are sensible):
      # LAGER_LOCK_WAIT: '1800'    # seconds to wait on a lock collision
      # LAGER_LOCK_TTL:  '1800'    # seconds the server holds a lock without a heartbeat
      # LAGER_LOCK_HEARTBEAT: '60' # seconds between heartbeat refreshes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lager CLI (editable, from this repo)
        run: pip install -e cli/
        shell: bash

      - name: Register lager box
        run: |
          lager boxes add \
            --name "$LAGER_BOX" \
            --ip "${{ secrets.LAGER_BOX_IP }}" \
            --user lagerdata \
            --yes
        shell: bash

      - name: Set up lager SSH key
        run: |
          if [ ! -f ~/.ssh/lager_box ]; then
            ssh-keygen -t ed25519 -f ~/.ssh/lager_box -N "" -C "lager-box-access"
          fi
          grep -qF "$(cat ~/.ssh/lager_box.pub)" ~/.ssh/authorized_keys 2>/dev/null || \
            cat ~/.ssh/lager_box.pub >> ~/.ssh/authorized_keys
        shell: bash

      - name: Verify box connectivity
        run: lager hello --box "$LAGER_BOX"
        shell: bash

      - name: Verify update probe (non-fatal)
        # rc 0 = up to date, rc 1 = update available; both are fine. Anything
        # higher is a real failure. Surfaces CLI/box version skew without
        # gating the hardware suites.
        continue-on-error: true
        run: |
          rc=0; lager update --check --box "$LAGER_BOX" || rc=$?
          [ "$rc" -le 1 ] || exit "$rc"
        shell: bash

      - name: Test Rigol DP821 CH1 (60V / 1A)
        id: rigol-ch1-test
        continue-on-error: true
        timeout-minutes: 8
        env:
          SUPPLY_NET: ${{ vars.RIGOL_CH1_NET || 'supply2' }}
          CHANNEL_MAX_VOLTAGE: ${{ vars.RIGOL_CH1_MAX_VOLTAGE || '60.0' }}
          CHANNEL_MAX_CURRENT: ${{ vars.RIGOL_CH1_MAX_CURRENT || '1.0' }}
        run: lager python test/api/power/test_supply_Rigol_DP821.py --box "$LAGER_BOX"
        shell: bash

      - name: Test Rigol DP821 CH2 (8V / 10A)
        id: rigol-ch2-test
        continue-on-error: true
        timeout-minutes: 8
        env:
          SUPPLY_NET: ${{ vars.RIGOL_CH2_NET || 'supply3' }}
          CHANNEL_MAX_VOLTAGE: ${{ vars.RIGOL_CH2_MAX_VOLTAGE || '8.0' }}
          CHANNEL_MAX_CURRENT: ${{ vars.RIGOL_CH2_MAX_CURRENT || '10.0' }}
        run: lager python test/api/power/test_supply_Rigol_DP821.py --box "$LAGER_BOX"
        shell: bash

      - name: Test LabJack T7 (ADC / DAC / GPIO)
        id: labjack-test
        continue-on-error: true
        timeout-minutes: 8
        env:
          ADC_NET: ${{ vars.ADC_NET || 'adc1' }}
          DAC_NET: ${{ vars.DAC_NET || 'dac1' }}
          GPIO_NET: ${{ vars.GPIO_NET || 'gpio16' }}
          ADC_NETS: ${{ vars.ADC_NETS || 'adc1,adc2,adc3' }}
          LOOPBACK_ADC_NET: ${{ vars.LOOPBACK_ADC_NET || 'adc1' }}
        run: lager python test/api/io/test_LabJack_T7.py --box "$LAGER_BOX"
        shell: bash

      - name: Test Acroname USB Hub
        id: acroname-test
        continue-on-error: true
        timeout-minutes: 8
        env:
          USB_NET: ${{ vars.USB_NET || 'usb1' }}
          USB_NETS: ${{ vars.USB_NETS || 'usb1' }}
        run: lager python test/api/usb/test_Acroname.py --box "$LAGER_BOX"
        shell: bash

      - name: Test Keithley 2281S power supply
        id: keithley-supply-test
        continue-on-error: true
        timeout-minutes: 8
        env:
          KEITHLEY_SUPPLY_NET: ${{ vars.KEITHLEY_SUPPLY_NET || 'supply1' }}
          KEITHLEY_MAX_VOLTAGE: ${{ vars.KEITHLEY_MAX_VOLTAGE || '20.0' }}
          KEITHLEY_MAX_CURRENT: ${{ vars.KEITHLEY_MAX_CURRENT || '6.0' }}
        run: lager python test/api/power/test_supply_Keithley_2281S.py --box "$LAGER_BOX"
        shell: bash

      - name: Test Keithley 2281S battery simulator
        id: keithley-battery-test
        continue-on-error: true
        timeout-minutes: 8
        env:
          KEITHLEY_BATTERY_NET: ${{ vars.KEITHLEY_BATTERY_NET || 'battery1' }}
        run: lager python test/api/power/test_battery_Keithley_2281S.py --box "$LAGER_BOX"
        shell: bash

      - name: Test MCC USB-202 (ADC / DAC / GPIO)
        id: usb202-test
        continue-on-error: true
        timeout-minutes: 8
        env:
          ADC_NETS: ${{ vars.USB202_ADC_NETS || 'adc15,adc16,adc17,adc18,adc19,adc20,adc21,adc22' }}
          DAC_NETS: ${{ vars.USB202_DAC_NETS || 'dac3,dac4' }}
          GPIO_NETS: ${{ vars.USB202_GPIO_NETS || 'gpio24,gpio25,gpio26,gpio27,gpio28,gpio29,gpio30,gpio31' }}
          SUPPLY_NET: ${{ vars.USB202_SUPPLY_NET || '' }}
          SUPPLY_VOLTAGE: ${{ vars.USB202_SUPPLY_VOLTAGE || '3.3' }}
          SUPPLY_ADC_NET: ${{ vars.USB202_SUPPLY_ADC_NET || '' }}
          LABJACK_ADC_NET: ${{ vars.USB202_LABJACK_ADC_NET || '' }}
          GPIO_LOOPBACK_OUT: ${{ vars.USB202_GPIO_LOOPBACK_OUT || '' }}
          GPIO_LOOPBACK_IN: ${{ vars.USB202_GPIO_LOOPBACK_IN || '' }}
        run: lager python test/api/io/test_usb202.py --box "$LAGER_BOX"
        shell: bash

      - name: Fail job if any test failed
        # Every instrument step is continue-on-error so all instruments get
        # exercised in one run; this gate turns any failure into a job failure.
        if: >
          steps.rigol-ch1-test.outcome == 'failure' ||
          steps.rigol-ch2-test.outcome == 'failure' ||
          steps.labjack-test.outcome == 'failure' ||
          steps.acroname-test.outcome == 'failure' ||
          steps.keithley-supply-test.outcome == 'failure' ||
          steps.keithley-battery-test.outcome == 'failure' ||
          steps.usb202-test.outcome == 'failure'
        run: |
          echo "One or more hardware tests failed:"
          echo "  rigol-ch1-test:        ${{ steps.rigol-ch1-test.outcome }}"
          echo "  rigol-ch2-test:        ${{ steps.rigol-ch2-test.outcome }}"
          echo "  labjack-test:          ${{ steps.labjack-test.outcome }}"
          echo "  acroname-test:         ${{ steps.acroname-test.outcome }}"
          echo "  keithley-supply-test:  ${{ steps.keithley-supply-test.outcome }}"
          echo "  keithley-battery-test: ${{ steps.keithley-battery-test.outcome }}"
          echo "  usb202-test:           ${{ steps.usb202-test.outcome }}"
          exit 1
        shell: bash

      - name: Best-effort lock cleanup
        # Defense in depth: if a step was killed in a way that bypassed the
        # CLI's release hook, force-release the lock so it doesn't sit until
        # the server TTL. The same-holder check on the box prevents stomping
        # another holder's live lock.
        if: always()
        run: lager boxes unlock --box "$LAGER_BOX" 2>/dev/null || true
        shell: bash
